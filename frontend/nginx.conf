server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # ── API path-routing → per-service containers ────────────────────────────
    # There is no custom API gateway; nginx routes each path prefix to the
    # service that owns it (mirrors the EKS ALB Ingress path rules). Each service
    # mounts its routes under /api, so the original URI is preserved upstream.

    # Identity (auth, users, HR)
    location /api/auth      { proxy_pass http://identity:5001; include /etc/nginx/conf.d/proxy.inc; }
    location /api/users     { proxy_pass http://identity:5001; include /etc/nginx/conf.d/proxy.inc; }
    location /api/hr        { proxy_pass http://identity:5001; include /etc/nginx/conf.d/proxy.inc; }

    # Procurement (vendors, purchase requests/orders, contracts)
    location /api/vendors            { proxy_pass http://procurement:5003; include /etc/nginx/conf.d/proxy.inc; }
    location /api/purchase-requests  { proxy_pass http://procurement:5003; include /etc/nginx/conf.d/proxy.inc; }
    location /api/purchase-orders    { proxy_pass http://procurement:5003; include /etc/nginx/conf.d/proxy.inc; }
    location /api/contracts          { proxy_pass http://procurement:5003; include /etc/nginx/conf.d/proxy.inc; }

    # Finance (invoices, payments, customers)
    location /api/invoices   { proxy_pass http://finance:5002; include /etc/nginx/conf.d/proxy.inc; }
    location /api/payments   { proxy_pass http://finance:5002; include /etc/nginx/conf.d/proxy.inc; }
    location /api/customers  { proxy_pass http://finance:5002; include /etc/nginx/conf.d/proxy.inc; }

    # Document (documents, notifications, audit)
    location /api/documents      { proxy_pass http://document:5004; include /etc/nginx/conf.d/proxy.inc; }
    location /api/notifications  { proxy_pass http://document:5004; include /etc/nginx/conf.d/proxy.inc; }
    location /api/audit          { proxy_pass http://document:5004; include /etc/nginx/conf.d/proxy.inc; }

    # AI
    location /api/ai { proxy_pass http://ai:5006; include /etc/nginx/conf.d/proxy.inc; }

    # ── React SPA (static files) ──────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
