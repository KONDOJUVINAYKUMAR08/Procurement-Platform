name: Bootstrap Cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap (dev or prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Bootstrap EKS Cluster
        run: |
          # Fetch Terraform outputs first
          cd terraform/environments/${{ inputs.environment }}
          terraform init
          CLUSTER_NAME=$(terraform output -raw eks_cluster_name)
          LBC_ROLE_ARN=$(terraform output -raw eks_lbc_role_arn)
          cd ../../../
          
          # Configure kubectl
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          
          # Install AWS Load Balancer Controller
          helm repo add eks https://aws.github.io/eks-charts --force-update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=$CLUSTER_NAME \
            --set serviceAccount.create=true \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${LBC_ROLE_ARN}" \
            --wait
            
          # Install ArgoCD
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          helm repo add argo https://argoproj.github.io/argo-helm --force-update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --set server.service.type=LoadBalancer \
            --wait
            
          # Apply ArgoCD App-of-Apps
          kubectl apply -f gitops/applications/environments/${{ inputs.environment }}/platform.yaml
          
          # Output credentials
          echo "======================================"
          echo "ArgoCD URL:"
          kubectl -n argocd get svc argocd-server -o jsonpath="{.status.loadBalancer.ingress[0].hostname}"
          echo ""
          echo "ArgoCD initial admin password:"
          kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
          echo ""
          echo "======================================"
