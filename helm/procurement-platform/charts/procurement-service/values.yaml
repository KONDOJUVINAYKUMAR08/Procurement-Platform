replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 5003
  targetPort: 5003

healthCheck:
  path: /api/health

ingress:
  enabled: true
  className: alb
  groupOrder: 20
  pathPrefixes:
    - path: /api/vendors
      pathType: Prefix
    - path: /api/purchase-requests
      pathType: Prefix
    - path: /api/purchase-orders
      pathType: Prefix
    - path: /api/contracts
      pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

extraEnv: {}
