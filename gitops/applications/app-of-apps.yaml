apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: procurement-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KONDOJUVINAYKUMAR08/Procurement-Platform.git
    targetRevision: HEAD
    path: gitops/applications/environments
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
