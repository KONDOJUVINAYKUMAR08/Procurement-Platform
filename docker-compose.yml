version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/procurement-platform
      - JWT_SECRET=development_jwt_secret_key_12345
      - JWT_REFRESH_SECRET=development_jwt_refresh_secret_key_12345
      - AWS_REGION=us-east-1
      # Assuming local development uses localstack or similar if AWS services are strictly required, 
      # but standard execution relies on MONGODB_URI here.
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
