services:
  # ── Backend (API Gateway — monolith) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/gateway/api-gateway/Dockerfile
    container_name: procurement-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-procurement-documents-08}
      AWS_KMS_KEY_ID: ${AWS_KMS_KEY_ID:-}
      AWS_SECRET_NAME: ${AWS_SECRET_NAME:-procurement/prod/app-config}
      AWS_BEDROCK_REGION: ${AWS_BEDROCK_REGION:-us-east-1}
      AWS_BEDROCK_TEXT_MODEL_ID: ${AWS_BEDROCK_TEXT_MODEL_ID:-amazon.nova-pro-v1:0}
      AWS_BEDROCK_EMBEDDING_MODEL_ID: ${AWS_BEDROCK_EMBEDDING_MODEL_ID:-amazon.nova-2-multimodal-embeddings-v1:0}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production_12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production_12345}
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@procureflow.com}
    restart: unless-stopped

  # ── Frontend (Nginx + React build) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: procurement-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

  # ── Seed (one-shot, run with --profile seed) ────────────────────────────────
  seed:
    build:
      context: .
      dockerfile: backend/gateway/api-gateway/Dockerfile
    container_name: procurement-seed
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SECRET_NAME: ${AWS_SECRET_NAME:-procurement/prod/app-config}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production_12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production_12345}
    command: ['node', '-e', "require('./backend/scripts/seed.js')"]
    profiles:
      - seed

  # ── Bootstrap Admin (one-shot, run with --profile bootstrap) ────────────────
  bootstrap-admin:
    build:
      context: .
      dockerfile: backend/gateway/api-gateway/Dockerfile
    container_name: procurement-bootstrap-admin
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SECRET_NAME: ${AWS_SECRET_NAME:-procurement/prod/app-config}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production_12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production_12345}
    command: ['node', '-e', "require('./backend/scripts/bootstrap-admin.js')"]
    profiles:
      - bootstrap

